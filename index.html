<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { 
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        padding: 20px; background: rgba(255,255,255,0.9); border: 2px solid #000;
        z-index: 9999; text-align: center; font-family: sans-serif;
      }
    </style>
  </head>
  <body>

    <div id="ui">
      <h3>AR SİSTEMİ BAŞLATILIYOR</h3>
      <p>Kamerayı açmak ve sesi etkinleştirmek için dokunun.</p>
      <button id="start-btn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiError: true; uiLoading: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./video.mp4" webkit-playsinline playsinline loop muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const ui = document.querySelector("#ui");
      const video = document.querySelector("#vid");

      startBtn.addEventListener('click', () => {
        video.muted = false; 
        video.play();
        ui.style.display = 'none';
      });
    </script>
  </body>
</html>
